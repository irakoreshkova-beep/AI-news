name: Telegram AI Digest Manual

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "What to send: brief, analysis, or rubric"
        required: false
        default: "brief"
      force:
        description: "Send even if this mode already ran today"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: "gpt-4.1-mini"
          DIGEST_TRIGGER: "cronjob"
          DIGEST_MODE: ${{ github.event.inputs.mode || 'brief' }}
          DIGEST_FORCE_SEND: ${{ github.event.inputs.force || 'false' }}
          DIGEST_TIMEZONE: "Asia/Tbilisi"
          DIGEST_LOOKBACK_HOURS: "30"
          DIGEST_MAX_ITEMS: "8"
        run: python ai-news-telegram/daily_digest.py

      - name: Commit digest state
        run: |
          if [ -z "$(git status --short -- ai-news-telegram/digest_state.json)" ]; then
            echo "No digest state changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-news-telegram/digest_state.json
          git commit -m "Update telegram digest state"
          git push
