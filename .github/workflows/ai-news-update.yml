name: Update AI Brief Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
      timezone: "Asia/Tbilisi"

permissions:
  contents: write

jobs:
  update-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate digest JSON
        env:
          AI_DIGEST_TIMEZONE: "Asia/Tbilisi"
          AI_DIGEST_LANGUAGE: "ru"
          AI_DIGEST_MAX_ITEMS: "12"
          AI_DIGEST_LOOKBACK_HOURS: "30"
          AI_DIGEST_ARCHIVE_DEPTH_DAYS: "30"
          AI_DIGEST_OPENAI_API_KEY: ${{ secrets.AI_DIGEST_OPENAI_API_KEY }}
          AI_DIGEST_OPENAI_MODEL: "gpt-4.1-mini"
        run: python scripts/generate_digest.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- site/data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data
          git commit -m "Update AI Brief data"
          git push
